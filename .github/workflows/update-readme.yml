name: Update README feed list

# Whenever feeds.yaml changes on main (e.g. a feed-request PR is merged),
# regenerate the table between the FEEDS markers in README.md and commit it back.
# The commit uses [skip ci] so it doesn't retrigger the build/deploy workflow.

on:
  push:
    branches: [main]
    paths:
      - feeds.yaml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-readme
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python .github/scripts/update_readme.py

      - name: Commit README if it changed
        run: |
          if git diff --quiet -- README.md; then
            echo "README already up to date."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "docs: update feed list in README [skip ci]"
            git push
          fi
